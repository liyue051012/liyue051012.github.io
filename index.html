<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>联络发展部 Party 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --green: #4ade80;
  --green-mid: #22c55e;
  --green-dark: #16a34a;
  --green-deep: #14532d;
  --green-pale: #bbf7d0;
  --cream: #fefce8;
  --gold: #fbbf24;
  --gold-dark: #d97706;
  --white: #fff;
  --shadow: rgba(22,163,74,0.25);
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  min-height:100vh;
  background: linear-gradient(135deg, #dcfce7 0%, #f0fdf4 40%, #d1fae5 70%, #ecfdf5 100%);
  font-family: 'Ma Shan Zheng','Noto Sans SC',serif;
  overflow-x: hidden;
  overflow-y: auto;
  position: relative;
}

/* Floating confetti dots */
body::before {
  content:'';
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    radial-gradient(circle, #4ade80 1px, transparent 1px),
    radial-gradient(circle, #fbbf24 1.5px, transparent 1.5px),
    radial-gradient(circle, #f472b6 1px, transparent 1px),
    radial-gradient(circle, #60a5fa 1.5px, transparent 1.5px);
  background-size: 120px 120px, 80px 80px, 100px 100px, 90px 90px;
  background-position: 20px 30px, 60px 70px, 10px 80px, 50px 20px;
  opacity: 0.4;
  animation: drift 20s linear infinite;
}
@keyframes drift { to { background-position: 140px 150px, 140px 150px, 110px 180px, 140px 110px; } }

canvas#confetti { position:fixed; inset:0; z-index:99; pointer-events:none; }

.container {
  position:relative; z-index:1;
  display:flex; flex-direction:column; align-items:center; gap:18px;
  padding: 20px 16px 48px;
  max-width: 620px; margin: 0 auto; width:100%;
}

/* ===== HEADER ===== */
.header {
  display:flex; align-items:center; gap:16px;
  background: linear-gradient(120deg, #16a34a, #22c55e);
  border-radius: 24px;
  padding: 14px 24px;
  width: 100%;
  box-shadow: 0 4px 24px rgba(22,163,74,0.3);
  position: relative;
  overflow: hidden;
}
.header::before {
  content:'';
  position:absolute; inset:0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
  border-radius: inherit;
}
.header-avatar {
  width: 72px; height: 72px;
  border-radius: 50%;
  border: 3px solid #fff;
  object-fit: cover;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  flex-shrink: 0;
  position: relative; z-index:1;
  image-rendering: -webkit-optimize-contrast;
  image-rendering: crisp-edges;
}
.header-text { position:relative; z-index:1; }
.header-title {
  color: #fff;
  font-size: clamp(1.4rem, 4vw, 2rem);
  font-weight: 900;
  letter-spacing: 0.08em;
  text-shadow: 0 2px 8px rgba(0,0,0,0.2);
  line-height: 1.2;
}
.header-sub {
  color: rgba(255,255,255,0.85);
  font-size: 0.8rem;
  letter-spacing: 0.2em;
  margin-top: 2px;
  font-family: 'Noto Sans SC',sans-serif;
}

/* ===== WHEEL ===== */
.wheel-wrapper {
  position:relative;
  width: min(460px, 88vw);
  height: min(460px, 88vw);
  filter: drop-shadow(0 8px 32px rgba(22,163,74,0.25));
}
.wheel-ring {
  position:absolute; inset:-12px; border-radius:50%;
  border: 4px solid rgba(74,222,128,0.5);
  box-shadow: 0 0 0 2px rgba(74,222,128,0.15), 0 0 20px rgba(74,222,128,0.2);
  pointer-events:none; z-index:2;
}
.wheel-ring-spin {
  position:absolute; inset:-20px; border-radius:50%;
  background: conic-gradient(
    from 0deg,
    transparent 0deg, rgba(74,222,128,0.5) 12deg, transparent 24deg,
    transparent 60deg, rgba(251,191,36,0.5) 72deg, transparent 84deg,
    transparent 120deg, rgba(74,222,128,0.5) 132deg, transparent 144deg,
    transparent 180deg, rgba(244,114,182,0.4) 192deg, transparent 204deg,
    transparent 240deg, rgba(74,222,128,0.5) 252deg, transparent 264deg,
    transparent 300deg, rgba(251,191,36,0.4) 312deg, transparent 324deg
  );
  animation: ring-spin 5s linear infinite;
  filter: blur(4px);
  z-index:0; opacity:0.85;
}
@keyframes ring-spin { to { transform:rotate(360deg); } }

canvas#wheel {
  border-radius:50%; position:relative; z-index:1;
  display:block; width:100%; height:100%;
  box-shadow: 0 4px 30px rgba(22,163,74,0.2);
}

/* pointer at top */
.pointer {
  position:absolute; top:-8px; left:50%;
  transform:translateX(-50%);
  z-index:10; pointer-events:none;
  display:flex; flex-direction:column; align-items:center;
}
.pointer-body {
  width:0; height:0;
  border-left:14px solid transparent;
  border-right:14px solid transparent;
  border-top:56px solid var(--gold);
  filter: drop-shadow(0 2px 6px rgba(251,191,36,0.6));
}

/* ===== BUTTON ===== */
.spin-btn {
  padding:14px 60px;
  font-family:inherit; font-size:1.35rem; font-weight:900;
  letter-spacing:0.18em; color:#fff;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 50px; cursor:pointer;
  box-shadow: 0 4px 20px rgba(22,163,74,0.4), inset 0 1px 0 rgba(255,255,255,0.25);
  transition: transform 0.15s, box-shadow 0.15s;
  position:relative; overflow:hidden;
  text-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
.spin-btn::before {
  content:'';
  position:absolute; inset:0;
  background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 60%);
  border-radius:inherit;
}
.spin-btn::after {
  content:'';
  position:absolute; top:0; left:-100%; width:50%; height:100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  animation: btn-shine 3s ease-in-out infinite;
}
@keyframes btn-shine { to { left:200%; } }
.spin-btn:hover:not(:disabled) {
  transform: translateY(-3px) scale(1.04);
  box-shadow: 0 8px 32px rgba(22,163,74,0.55);
}
.spin-btn:active:not(:disabled) { transform:scale(0.97); }
.spin-btn:disabled { opacity:0.5; cursor:not-allowed; }

/* ===== EXCLUSION BOX ===== */
.excl-box {
  width: min(460px,88vw);
  background: rgba(255,255,255,0.7);
  border: 2px solid rgba(74,222,128,0.4);
  border-radius: 20px;
  padding: 16px 20px;
  backdrop-filter: blur(8px);
  box-shadow: 0 2px 16px rgba(22,163,74,0.1);
}
.excl-label {
  color: var(--green-dark);
  font-size: 0.88rem;
  letter-spacing: 0.18em;
  margin-bottom: 10px;
  display:flex; align-items:center; gap:8px;
  font-family:'Noto Sans SC',sans-serif; font-weight:700;
}
.excl-label .dot {
  width:8px; height:8px;
  background: var(--green-mid); border-radius:50%;
  box-shadow: 0 0 6px var(--green-mid);
}
.excl-input {
  width:100%;
  background: rgba(255,255,255,0.9);
  border: 1.5px solid rgba(74,222,128,0.4);
  border-radius:12px; padding:10px 14px;
  color: #166534;
  font-family:inherit; font-size:0.95rem;
  outline:none; resize:none; min-height:44px; line-height:1.7;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.excl-input::placeholder { color: rgba(22,163,74,0.35); }
.excl-input:focus {
  border-color: var(--green-mid);
  box-shadow: 0 0 0 3px rgba(74,222,128,0.15);
}
.excl-hint {
  margin-top:6px; color: rgba(22,163,74,0.55);
  font-size:0.74rem; letter-spacing:0.1em;
  font-family:'Noto Sans SC',sans-serif;
}
.excl-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
.tag {
  background: rgba(254,226,226,0.8);
  border: 1px solid rgba(252,165,165,0.6);
  color: #dc2626; font-size:0.75rem;
  padding:3px 10px; border-radius:20px;
  font-family:'Noto Sans SC',sans-serif;
}

/* ===== RESULT MODAL ===== */
.result-overlay {
  display:none; position:fixed; inset:0;
  background: rgba(0,0,0,0.5);
  z-index:100; align-items:center; justify-content:center;
  backdrop-filter: blur(6px);
}
.result-overlay.show { display:flex; }
.result-card {
  background: linear-gradient(145deg, #f0fdf4, #dcfce7);
  border: 3px solid var(--green-mid);
  border-radius: 28px; padding:44px 56px; text-align:center;
  box-shadow: 0 20px 80px rgba(22,163,74,0.3), 0 4px 20px rgba(0,0,0,0.1);
  max-width:420px; width:90vw;
  animation: pop-in 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
  position:relative; overflow:hidden;
}
.result-card::before {
  content:'🎉'; font-size:80px; opacity:0.08;
  position:absolute; top:-20px; left:-10px; line-height:1;
}
.result-card::after {
  content:'🎊'; font-size:80px; opacity:0.08;
  position:absolute; bottom:-20px; right:-10px; line-height:1;
}
@keyframes pop-in {
  from { transform:scale(0.4) rotate(-8deg); opacity:0; }
  to   { transform:scale(1) rotate(0); opacity:1; }
}
.result-emoji { font-size:3rem; margin-bottom:12px; }
.result-label {
  color:var(--green-dark); font-size:0.9rem; letter-spacing:0.35em;
  margin-bottom:16px; font-family:'Noto Sans SC',sans-serif;
}
.result-name {
  color: var(--green-deep);
  font-size:clamp(2.6rem,10vw,4rem); font-weight:900;
  text-shadow: 0 2px 8px rgba(22,163,74,0.2);
  margin-bottom:12px; letter-spacing:0.12em;
}
.result-stars { color:var(--gold-dark); font-size:1.5rem; letter-spacing:0.25em; margin-bottom:36px; }
.result-close {
  padding:12px 48px; font-family:inherit; font-size:1rem; font-weight:900;
  color:#fff; letter-spacing:0.12em;
  background: linear-gradient(135deg,#22c55e,#16a34a);
  border:none; border-radius:40px; cursor:pointer;
  box-shadow: 0 4px 16px rgba(22,163,74,0.35);
  transition:transform 0.15s, box-shadow 0.15s;
}
.result-close:hover { transform:scale(1.06); box-shadow:0 8px 24px rgba(22,163,74,0.5); }
</style>
</head>
<body>

<canvas id="confetti"></canvas>

<div class="container">
  <div class="header">
    <img class="header-avatar" id="avatarImg" src="" alt="avatar">
    <div class="header-text">
      <div class="header-title">联络发展部 Party 🎉</div>
      <div class="header-sub">幸 运 大 转 盘 · LUCKY SPIN</div>
    </div>
  </div>

  <div class="wheel-wrapper">
    <div class="wheel-ring-spin"></div>
    <div class="wheel-ring"></div>
    <canvas id="wheel"></canvas>
    <div class="pointer"><div class="pointer-body"></div></div>
  </div>

  <button class="spin-btn" id="spinBtn" onclick="spin()">开 始 抽 奖 🎁</button>

  <div class="excl-box">
    <div class="excl-label"><span class="dot"></span>排除名单（不参与抽奖）</div>
    <textarea class="excl-input" id="excludeInput"
      placeholder="输入姓名，多个用 # 分隔，例如：张三#李四"
      rows="2" oninput="updateExclusion()"></textarea>
    <div class="excl-hint">用 # 分隔多个姓名</div>
    <div class="excl-tags" id="excludedTags"></div>
  </div>
</div>

<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <div class="result-emoji">🎉</div>
    <div class="result-label">恭 喜 获 奖 者</div>
    <div class="result-name" id="resultName"></div>
    <div class="result-stars">★ ★ ★ ★ ★</div>
    <button class="result-close" onclick="closeResult()">再 抽 一 次 🎁</button>
  </div>
</div>

// ── Names ────────────────────────────────────────────────────────
const ALL_NAMES = [
  "魏俊安","彭慧聪","张漾","鄢嘉倪","李皓然","谢竺霏","马忻怡","刘怡然","刘晶莹",
  "周炘语","冯浩桐","谢家敬","刘书畅","吴旭邦","陈钰洵","洪亮","尹飞燕","黄振龙",
  "梁宗源","周承昭","张博文","谢育楠","李雨晴","陈科雅","邵婉宁","欧阳俊伊","李鸣庭","李跃"
];

// Sector color pairs — greens + accent
const SECTOR_PAIRS = [
  ["#16a34a","#4ade80"],
  ["#15803d","#22c55e"],
  ["#166534","#4ade80"],
  ["#14532d","#22c55e"],
];
const ACCENT_PAIRS = [
  ["#ca8a04","#fbbf24"],
  ["#16a34a","#4ade80"],
];

// ── Canvas ────────────────────────────────────────────────────────
const wCanvas = document.getElementById('wheel');
const wCtx = wCanvas.getContext('2d');
const SIZE = 500;
wCanvas.width = SIZE; wCanvas.height = SIZE;
const R = SIZE/2, cx = R, cy = R;

let wheelAngle = 0;
let spinning = false;
let winnerIdx = -1;
let activeNames = [...ALL_NAMES];

// ── Exclusion ────────────────────────────────────────────────────
function getExcluded() {
  return document.getElementById('excludeInput').value
    .split('#').map(s=>s.trim()).filter(Boolean);
}
function updateExclusion() {
  const exc = getExcluded();
  document.getElementById('excludedTags').innerHTML =
    exc.map(n=>`<span class="tag">✕ ${n}</span>`).join('');
  activeNames = ALL_NAMES.filter(n=>!exc.includes(n));
  drawWheel(wheelAngle);
}

// ── Draw ─────────────────────────────────────────────────────────
function drawWheel(angle) {
  wCtx.clearRect(0,0,SIZE,SIZE);
  const N = activeNames.length;
  if (N===0) {
    wCtx.fillStyle='#dcfce7';
    wCtx.beginPath(); wCtx.arc(cx,cy,R-4,0,Math.PI*2); wCtx.fill();
    wCtx.fillStyle='#166534'; wCtx.font="16px 'Noto Sans SC'";
    wCtx.textAlign='center'; wCtx.textBaseline='middle';
    wCtx.fillText('所有人已被排除',cx,cy);
    return;
  }
  const slice = (2*Math.PI)/N;
  for (let i=0; i<N; i++) {
    const a0 = angle + i*slice - Math.PI/2;
    const a1 = a0 + slice;
    const useAccent = (i % 7 === 0);
    const [fill, rim] = useAccent ? ACCENT_PAIRS[i%2] : SECTOR_PAIRS[i%SECTOR_PAIRS.length];

    wCtx.beginPath(); wCtx.moveTo(cx,cy); wCtx.arc(cx,cy,R-4,a0,a1); wCtx.closePath();
    wCtx.fillStyle=fill; wCtx.fill();

    wCtx.beginPath(); wCtx.arc(cx,cy,R-9,a0+0.01,a1-0.01);
    wCtx.strokeStyle=rim; wCtx.lineWidth=5; wCtx.stroke();

    wCtx.beginPath(); wCtx.moveTo(cx,cy); wCtx.arc(cx,cy,R-4,a0,a1); wCtx.closePath();
    wCtx.strokeStyle='rgba(255,255,255,0.2)'; wCtx.lineWidth=1; wCtx.stroke();

    wCtx.save();
    wCtx.translate(cx,cy); wCtx.rotate(a0+slice/2);
    wCtx.textAlign='right'; wCtx.fillStyle='#fff';
    wCtx.shadowColor='rgba(0,0,0,0.5)'; wCtx.shadowBlur=4;
    const name = activeNames[i];
    const fs = name.length>=4 ? (N>22?10:12) : (N>22?11:14);
    wCtx.font=`bold ${fs}px 'Ma Shan Zheng','Noto Sans SC',serif`;
    wCtx.fillText(name, R-16, 4);
    wCtx.restore();
  }

  // Hub
  const hub = wCtx.createRadialGradient(cx,cy,0,cx,cy,48);
  hub.addColorStop(0,'#fef9c3'); hub.addColorStop(0.5,'#fbbf24'); hub.addColorStop(1,'#d97706');
  wCtx.beginPath(); wCtx.arc(cx,cy,48,0,Math.PI*2);
  wCtx.fillStyle=hub; wCtx.fill();
  wCtx.strokeStyle='rgba(255,255,255,0.8)'; wCtx.lineWidth=3; wCtx.stroke();
  wCtx.shadowBlur=0;
  wCtx.fillStyle='#166534';
  wCtx.font="bold 15px 'Ma Shan Zheng','Noto Sans SC',serif";
  wCtx.textAlign='center'; wCtx.textBaseline='middle';
  wCtx.fillText('🎁', cx, cy);
}
drawWheel(0);

// ── Easing ───────────────────────────────────────────────────────
function easeOut(t) { return 1 - Math.pow(1-t, 4); }

// ── Spin ──────────────────────────────────────────────────────────
// Pointer is at top (12-o'clock, pointing DOWN).
// Slice i midpoint angle from wheel center = wheelAngle + (i+0.5)*slice - PI/2
// We want midpoint of winnerIdx slice to point at angle 0 (top = -PI/2 in canvas).
// => wheelAngle_final + (winnerIdx+0.5)*slice - PI/2 ≡ -PI/2  (mod 2PI)
// => wheelAngle_final ≡ -(winnerIdx+0.5)*slice  (mod 2PI)

function spin() {
  if (spinning) return;
  const N = activeNames.length;
  if (N===0) { alert('所有人已被排除，无法抽奖！'); return; }
  spinning = true;
  document.getElementById('spinBtn').disabled = true;

  // Easter egg
  const exc = getExcluded();
  const egg = exc.length>0 && exc[exc.length-1]==='李跃';
  if (egg && activeNames.includes('邵婉宁')) {
    winnerIdx = activeNames.indexOf('邵婉宁');
  } else {
    winnerIdx = Math.floor(Math.random()*N);
  }

  const slice = (2*Math.PI)/N;
  const targetAngle = -(winnerIdx+0.5)*slice;   // desired final wheelAngle mod 2PI
  const spins = 6 + Math.random()*4;
  // current normalised angle
  const curMod = ((wheelAngle % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
  // how far to spin to reach target (always forward)
  let delta = ((targetAngle - curMod) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
  if (delta < 0.01) delta = 2*Math.PI; // avoid 0
  const totalAngle = spins*2*Math.PI + delta;

  const duration = 5200 + Math.random()*1000;
  const t0 = performance.now();
  const a0 = wheelAngle;

  function frame(now) {
    const t = Math.min((now-t0)/duration, 1);
    wheelAngle = a0 + totalAngle*easeOut(t);
    drawWheel(wheelAngle);
    if (t<1) requestAnimationFrame(frame);
    else { wheelAngle = a0+totalAngle; drawWheel(wheelAngle); spinning=false; setTimeout(showResult,300); }
  }
  requestAnimationFrame(frame);
}

function showResult() {
  document.getElementById('resultName').textContent = activeNames[winnerIdx];
  document.getElementById('resultOverlay').classList.add('show');
  launchConfetti();
}
function closeResult() {
  document.getElementById('resultOverlay').classList.remove('show');
  document.getElementById('spinBtn').disabled = false;
  stopConfetti();
}

// ── Confetti ─────────────────────────────────────────────────────
const confCanvas = document.getElementById('confetti');
const confCtx = confCanvas.getContext('2d');
confCanvas.width = innerWidth; confCanvas.height = innerHeight;
let pieces=[], confId;
function launchConfetti() {
  pieces=[];
  const cols=['#4ade80','#fbbf24','#f472b6','#60a5fa','#34d399','#a78bfa','#fff'];
  for (let i=0;i<160;i++) pieces.push({
    x:Math.random()*confCanvas.width, y:-20-Math.random()*200,
    w:6+Math.random()*8, h:3+Math.random()*4,
    color:cols[Math.floor(Math.random()*cols.length)],
    vx:(Math.random()-.5)*5, vy:2+Math.random()*4,
    rot:Math.random()*360, rs:(Math.random()-.5)*9
  });
  animConf();
}
function animConf() {
  confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
  pieces.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.rot+=p.rs;
    confCtx.save(); confCtx.translate(p.x,p.y); confCtx.rotate(p.rot*Math.PI/180);
    confCtx.fillStyle=p.color; confCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    confCtx.restore();
  });
  pieces=pieces.filter(p=>p.y<confCanvas.height+20);
  if (pieces.length) confId=requestAnimationFrame(animConf);
  else confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
}
function stopConfetti() { cancelAnimationFrame(confId); confCtx.clearRect(0,0,confCanvas.width,confCanvas.height); }
window.addEventListener('resize',()=>{ confCanvas.width=innerWidth; confCanvas.height=innerHeight; });
</script>
</body>
</html>
